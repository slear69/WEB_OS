<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bootScreen">
        <div id="bootContent">
            <h1 class="glitchText" data-text="FutureOS">FutureOS</h1>
            <p class="bootSubtitle">WE ALL LOVE CYBERPUNK</p>
            <div id="terminalLog"></div>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" data-window="files">
            <img src="images/small_folder.png" class="desktopIcon" alt="Files icon">
            <span>Files</span>
        </div>

        <div class="icon" data-window="browser">
            <img src="images/broswer.png" class="desktopIcon" alt="Browser icon">
            <span>Browser</span>
        </div>

        <div class="icon" data-window="notes">
            <img src="images/note.png" class="desktopIcon" alt="Notes icon">
            <span>Notes</span>
        </div>
    </div>

    <div class="window" id="files" style="top:120px; left:180px;">
        <div class="windowHeader">
            <span>📁 File Explorer</span>
            <div class="windowButtons">
                <button type="button" data-close-window="files">✕</button>
            </div>
        </div>
        <div class="windowContent">
            <div id="fileList"></div>
        </div>
    </div>
    <div class="window" id="browser" style="top:90px; left:220px;">
        <div class="windowHeader">
            <span>🌐 Browser</span>
            <div class="windowButtons">
                <button type="button" data-close-window="browser">✕</button>
            </div>
        </div>
        <div class="windowContent browserContent">
            <div class="browserToolbar">
                <input id="url" type="text" placeholder="https://www.bilibili.tv/en/video/4790502645433344">
                <button id="openWebsiteButton" type="button">Go</button>
            </div>
            <iframe id="browserFrame" title="Web browser"></iframe>
        </div>
    </div>

    <div class="window" id="notes" style="top:110px; left:240px;">
        <div class="windowHeader">
            <span>📝 Notes</span>
            <div class="windowButtons">
                <button type="button" data-close-window="notes">✕</button>
            </div>
        </div>
        <div class="windowContent notesContent">
            <textarea id="notesArea" aria-label="Notes editor"></textarea>
        </div>
    </div>

    <div id="startMenu" aria-label="Start menu">
        <button type="button" data-window="files">Files</button>
        <button type="button" data-window="browser">Browser</button>
        <button type="button" data-window="notes">Notes</button>
    </div>

    <div id="taskbar">
        <div id="taskbar-left">
            <button id="startButton" type="button" aria-label="Open start menu">⊞</button>
            <button class="taskIcon" type="button" data-window="files">
                <img src="images/mini_folder.png" class="desktopIcon" alt="File explorer shortcut">
            </button>
            <button class="taskIcon" type="button" data-window="browser">
                <img src="images/mini_browser.png" class="desktopIcon" alt="Browser shortcut">
            </button>
            <button class="taskIcon" type="button" data-window="notes">
                <img src="images/mini_notes.png" class="desktopIcon" alt="Notes shortcut">
            </button>
            <button id="glitchCursorButton" class="taskIcon" type="button" title="Toggle Glitch Cursor">
                ✨
            </button>
        </div>

        <div id="taskbar-right">
            <span id="clock" aria-live="polite"></span>
        </div>
    </div>

    <div id="musicPlayer">
        <div id="songName">Song 1</div>
        <img id="songCover" src="images/Cyberpunk 2077_ Radio, Vol (1). 2 (Original Soundtrack).jpg" alt="Song cover" class="songCover">
        <div class="controls">
            <button id="playButton" type="button">▶</button>
            <button id="pauseButton" type="button">⏸</button>
            <button id="skipButton" type="button">⏭</button>
        </div>
    </div>

    <script src="script.new.js"></script>
</body>
</html>
